<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RBAC App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="app.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl">RBAC System</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="navUserName" class="text-sm font-medium"></span>
                    <button onclick="logout()" class="bg-blue-500 hover:bg-blue-700 text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Profile Section -->
        <div class="bg-white shadow rounded-lg mb-6 overflow-hidden">
            <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Your Profile</h3>
                <p class="mt-1 max-w-2xl text-sm text-gray-500">Personal details and application role.</p>
            </div>
            <div class="px-4 py-5 sm:p-0">
                <dl class="sm:divide-y sm:divide-gray-200" id="profileContent">
                    <div class="py-4 sm:py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">Full name</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" id="profileName">Loading...</dd>
                    </div>
                    <div class="py-4 sm:py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">Email address</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" id="profileEmail">Loading...</dd>
                    </div>
                    <div class="py-4 sm:py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">Role</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2">
                            <span id="profileRole" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                Loading...
                            </span>
                        </dd>
                    </div>
                </dl>
            </div>
        </div>

        <!-- Admin Only Section -->
        <div id="adminSection" class="hidden bg-white shadow rounded-lg overflow-hidden">
            <div class="px-4 py-5 sm:px-6 border-b border-gray-200 flex justify-between items-center">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900">All Users (Admin View)</h3>
                    <p class="mt-1 max-w-2xl text-sm text-gray-500">List of all registered users in the system.</p>
                </div>
                <button onclick="fetchUsers()" class="text-blue-600 hover:text-blue-900 text-sm font-medium">Refresh</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- User rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        checkAuth();

        async function fetchProfile() {
            try {
                const response = await fetch(API_URL + '/users/me', {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('navUserName').textContent = `Hello, ${user.name}`;
                    document.getElementById('profileName').textContent = user.name;
                    document.getElementById('profileEmail').textContent = user.email;
                    
                    const roleBadge = document.getElementById('profileRole');
                    roleBadge.textContent = user.role;
                    
                    if (user.role === 'Admin') {
                        roleBadge.classList.replace('bg-green-100', 'bg-purple-100');
                        roleBadge.classList.replace('text-green-800', 'text-purple-800');
                        document.getElementById('adminSection').classList.remove('hidden');
                        fetchUsers();
                    }
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error('Error fetching profile:', error);
            }
        }

        async function fetchUsers() {
            try {
                const response = await fetch(API_URL + '/users', {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (response.ok) {
                    const users = await response.json();
                    const tbody = document.getElementById('usersTableBody');
                    tbody.innerHTML = '';
                    
                    users.forEach(user => {
                        const tr = document.createElement('tr');
                        
                        const roleColorClass = user.role === 'Admin' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800';
                        
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${user.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.email}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${roleColorClass}">
                                    ${user.role}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <button onclick="editUser(${user.id}, '${user.name}', '${user.email}', '${user.role}')" class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
                                <button onclick="deleteUser(${user.id})" class="text-red-600 hover:text-red-900">Delete</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                const response = await fetch(API_URL + '/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                if (response.ok) {
                    fetchUsers();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to delete user');
                }
            } catch (error) {
                console.error('Error deleting user:', error);
            }
        }

        async function editUser(id, name, email, role) {
            const newName = prompt('Enter new name:', name);
            if (!newName) return;
            const newEmail = prompt('Enter new email:', email);
            if (!newEmail) return;
            let newRole = prompt('Enter new role (User or Admin):', role);
            if (!newRole || !['User', 'Admin'].includes(newRole)) newRole = role;

            try {
                const response = await fetch(API_URL + '/users/' + id, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: newName, email: newEmail, role: newRole })
                });
                if (response.ok) {
                    fetchUsers();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to update user');
                }
            } catch (error) {
                console.error('Error updating user:', error);
            }
        }

        // Initialize dashboard
        fetchProfile();
    </script>
</body>
</html>
